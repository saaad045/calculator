<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="calc.css">
    <script src="js.js"></script>
    <title>Basic Calculator</title>
</head>

<body>
    <div id="calculator">
        <form method="get">
            1st number:
            <input type="text" id="firstNumber"><br>
            2nd number:
            <input type="text" id="secondNumber"><br>
            <button type="button" onclick="addBy()">Add</button>
            <button type="button" onclick="subtractBy()">Subtract</button>
            <button type="button" onclick="multiplyBy()">Multiply</button>
            <button type="button" onclick="divideBy()">Divide</button>
        </form>
        <p>The result is: <span id="result"></span></p>
    </div>
</body>

</html>
